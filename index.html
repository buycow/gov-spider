<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>政府信息公开动态栏目更新情况</title>
<style>
body {
    font-family: "Microsoft YaHei", sans-serif;
    padding: 30px;
}
h2 {
    margin-bottom: 20px;
}
input {
    margin-bottom: 20px;
}
table {
    border-collapse: collapse;
    width: 100%;
}
th, td {
    border: 1px solid #ccc;
    padding: 8px;
}
th {
    background: #f5f5f5;
}
tr:hover {
    background: #f0f8ff;
}

/* ✅ 超过 10 天未更新 */
.warning-row {
    background-color: #ffcccc !important; /* 浅红色 */
}
</style>
</head>
<body>

<h2>政府信息公开动态栏目更新情况</h2>

<input type="file" accept=".json" onchange="loadJSON(event)">

<table>
    <thead>
        <tr>
            <th>单位</th>
            <th>最新稿件</th>
            <th>发布日期</th>
            <th>未更新天数</th>
        </tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>

<script>
function loadJSON(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function (e) {
        const text = e.target.result;
        const lines = text.trim().split("\n");
        const data = lines.map(l => JSON.parse(l));

        // ✅ 按未更新天数降序排序
        data.sort((a, b) => b.未更新天数 - a.未更新天数);

        const tbody = document.getElementById("tbody");
        tbody.innerHTML = "";

        data.forEach(item => {
            const tr = document.createElement("tr");

            // ✅ 超过 10 天 → 整行标浅红
            if (item.未更新天数 > 10) {
                tr.classList.add("warning-row");
            }

            tr.innerHTML = `
                <td>${item.单位}</td>
                <td>${item.最新稿件}</td>
                <td>${item.发布日期}</td>
                <td>${item.未更新天数}</td>
            `;
            tbody.appendChild(tr);
        });
    };

    reader.readAsText(file);
}
</script>

</body>
</html>
