<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fa;
            font-size: 14px;
        }
        .top-bar {
            background: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,.05);
            margin-bottom: 15px;
        }
        .table th {
            background: #f1f5f9;
            white-space: nowrap;
            text-align: center;
        }
        .table td {
            vertical-align: middle;
            text-align: center;
        }
        /* 列宽定制 */
        .col-time { width: 170px; }   /* 监测时间 */
        .col-link { width: 80px; }    /* 查看链接 */
        .col-pubtime { width: 140px; }/* 发布时间 */
        .badge-0 { background:#198754; }
        .badge-1-7 { background:#ffc107; color:#212529; }
        .badge-over { background:#dc3545; }
        .unit-name {
            max-width: 220px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .title-text {
            max-width: 360px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
<div class="container-fluid mt-3">

    <!-- 顶部：日历 + 搜索 -->
    <div class="top-bar d-flex align-items-center justify-content-between flex-wrap gap-2">
        <div class="d-flex align-items-center">
            <label class="me-2 mb-0 fw-bold">选择日期：</label>
            <input type="date" id="datePicker" class="form-control form-control-sm" style="width:180px;">
        </div>
        <div class="d-flex align-items-center">
            <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="搜索单位名称 / 稿件标题" style="width:260px;">
        </div>
    </div>

    <!-- 数据表格 -->
    <div class="table-responsive">
        <table class="table table-bordered table-hover bg-white">
            <thead>
                <tr>
                    <th>单位名称</th>
                    <th>最新稿件</th>
                    <th class="col-pubtime">发布时间</th>
                    <th class="col-time">监测时间</th>
                    <th class="col-link">栏目链接</th>
                    <th style="width:100px;">未更新天数</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="6" class="text-center text-muted">正在加载数据...</td></tr>
            </tbody>
        </table>
    </div>

</div>
