<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>政府信息公开动态栏目更新情况</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: #f0f2f5; color: #333; }
  .header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: #fff; padding: 24px 0; text-align: center; }
  .header h1 { font-size: 24px; font-weight: 600; }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

  /* 顶部控制栏：日历 + 搜索 并排 */
  .top-bar { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
  .top-bar-left { display: flex; align-items: center; gap: 12px; }
  .top-bar-left label { font-size: 15px; font-weight: 600; color: #333; white-space: nowrap; }
  .top-bar-left input[type="date"] {
    padding: 8px 14px; font-size: 15px; border: 2px solid #1a73e8; border-radius: 8px;
    outline: none; background: #fff; color: #333; cursor: pointer; font-family: inherit;
  }
  .top-bar-left input[type="date"]:focus { box-shadow: 0 0 0 3px rgba(26,115,232,0.2); }
  .search-box { position: relative; }
  .search-box input {
    padding: 8px 14px 8px 36px; font-size: 15px; border: 1px solid #ddd; border-radius: 8px;
    outline: none; width: 280px; transition: border .2s;
  }
  .search-box input:focus { border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,0.15); }
  .search-box::before {
    content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px;
  }

  /* 统计卡片横排 */
  .stats-row { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card {
    flex: 1; min-width: 160px; background: #fff; border-radius: 12px; padding: 16px 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08); text-align: center; transition: transform .2s;
  }
  .stat-card:hover { transform: translateY(-2px); }
  .stat-card .label { font-size: 13px; color: #888; margin-bottom: 6px; }
  .stat-card .value { font-size: 28px; font-weight: 700; }
  .stat-card.total .value { color: #1a73e8; }
  .stat-card.updated .value { color: #0f9d58; }
  .stat-card.week .value { color: #f9a825; }
  .stat-card.overdue .value { color: #e53935; }

  /* 表格 */
  .table-wrapper { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: #f5f7fa; font-size: 14px; font-weight: 600; color: #555; padding: 12px 14px; text-align: left; border-bottom: 2px solid #e8e8e8; white-space: nowrap; }
  tbody td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  tbody tr:hover { background: #f5f9ff; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .badge.green { background: #e6f4ea; color: #0f9d58; }
  .badge.yellow { background: #fff8e1; color: #f9a825; }
  .badge.red { background: #fce4ec; color: #e53935; }
  .link-btn { color: #1a73e8; text-decoration: none; font-weight: 500; font-size: 13px; }
  .link-btn:hover { text-decoration: underline; }
  .no-data { text-align: center; padding: 40px; color: #999; font-size: 15px; }

  /* 页脚 */
  .footer { text-align: center; padding: 20px; color: #999; font-size: 12px; }

  /* 序号列窄一点 */
  .col-seq { width: 50px; text-align: center; }
  .col-name { min-width: 200px; }
  .col-title { min-width: 300px; }
  .col-time { width: 140px; white-space: nowrap; }
  .col-monitor { width: 170px; white-space: nowrap; }
  .col-days { width: 110px; text-align: center; }
  .col-link { width: 80px; text-align: center; }

  @media (max-width: 768px) {
    .top-bar { flex-direction: column; align-items: stretch; }
    .top-bar-left { justify-content: center; }
    .search-box input { width: 100%; }
    .stats-row { gap: 8px; }
    .stat-card { min-width: 120px; padding: 12px 10px; }
    .stat-card .value { font-size: 22px; }
    .table-wrapper { overflow-x: auto; }
    table { min-width: 900px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📊 政府信息公开动态栏目更新情况</h1>
</div>

<div class="container">
  <!-- 顶部栏：左侧日历选择，右侧搜索 -->
  <div class="top-bar">
    <div class="top-bar-left">
      <label for="datePicker">选择日期：</label>
      <input type="date" id="datePicker">
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索单位名称或稿件标题...">
    </div>
  </div>

  <!-- 统计卡片 -->
  <div class="stats-row">
    <div class="stat-card total"><div class="label">监测单位数</div><div class="value" id="statTotal">0</div></div>
    <div class="stat-card updated"><div class="label">今日已更新</div><div class="value" id="statUpdated">0</div></div>
    <div class="stat-card week"><div class="label">一周内已更新</div><div class="value" id="statWeek">0</div></div>
    <div class="stat-card overdue"><div class="label">超7天未更新</div><div class="value" id="statOverdue">0</div></div>
  </div>

  <!-- 数据表格 -->
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th class="col-seq">序号</th>
          <th class="col-name">单位名称</th>
          <th class="col-title">最新稿件</th>
          <th class="col-time">发布时间</th>
          <th class="col-monitor">监测时间</th>
          <th class="col-days">未更新天数</th>
          <th class="col-link">栏目链接</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7" class="no-data">请选择日期查看数据</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="footer">数据来源：政府信息公开动态栏目监测 &nbsp;|&nbsp; 自动更新</div>

<script>
const JSON_FILE = '政府信息公开动态栏目更新情况.json';

let allData = {};
let currentDate = '';

// 加载 JSON 数据
fetch(JSON_FILE)
  .then(r => { if (!r.ok) throw new Error('无法加载数据文件'); return r.json(); })
  .then(data => {
    allData = data;
    initDatePicker();
  })
  .catch(err => {
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="7" class="no-data">⚠️ 数据文件加载失败，请确保 JSON 文件与页面同目录</td></tr>';
    console.error(err);
  });

function initDatePicker() {
  const picker = document.getElementById('datePicker');
  const dates = Object.keys(allData).sort();
  if (dates.length === 0) return;

  // 优先选当天，没有则选最新日期
  const now = new Date();
  const today =
    now.getFullYear() +
    String(now.getMonth() + 1).padStart(2, '0') +
    String(now.getDate()).padStart(2, '0');
  const defaultDate = dates.includes(today) ? today : dates[dates.length - 1];
  currentDate = defaultDate;
  picker.value = formatDateForInput(defaultDate);

  picker.addEventListener('change', () => {
    const val = picker.value; // "2026-07-08"
    const key = val.replace(/-/g, ''); // "20260708"
    if (allData[key]) {
      currentDate = key;
      renderTable(allData[key]);
      updateStats(allData[key]);
    } else {
      document.getElementById('tableBody').innerHTML =
        '<tr><td colspan="7" class="no-data">该日期暂无数据</td></tr>';
      resetStats();
    }
  });

  // 初始渲染
  renderTable(allData[defaultDate]);
  updateStats(allData[defaultDate]);
}

function formatDateForInput(str) {
  // "20260708" -> "2026-07-08"
  return str.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
}

function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  const keyword = document.getElementById('searchInput').value.trim().toLowerCase();

  let filtered = data;
  if (keyword) {
    filtered = data.filter(item =>
      (item['单位名称'] || '').toLowerCase().includes(keyword) ||
      (item['最新稿件'] || '').toLowerCase().includes(keyword)
    );
  }

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="no-data">暂无匹配数据</td></tr>';
    resetStats();
    return;
  }

  let html = '';
  filtered.forEach((item, i) => {
    const days = item['未更新天数'] || 0;
    const badgeClass = days === 0 ? 'green' : (days <= 7 ? 'yellow' : 'red');
    const link = item['栏目链接'] || '#';
    html += `<tr>
      <td class="col-seq">${i + 1}</td>
      <td class="col-name">${esc(item['单位名称'])}</td>
      <td class="col-title">${esc(item['最新稿件'])}</td>
      <td class="col-time">${esc(item['发布时间'])}</td>
      <td class="col-monitor">${esc(item['监测时间'])}</td>
      <td class="col-days"><span class="badge ${badgeClass}">${days}天</span></td>
      <td class="col-link"><a class="link-btn" href="${esc(link)}" target="_blank" rel="noopener">查看</a></td>
    </tr>`;
  });
  tbody.innerHTML = html;
}

function updateStats(data) {
  const total = data.length;
  const updated = data.filter(i => i['未更新天数'] === 0).length;
  const week = data.filter(i => i['未更新天数'] > 0 && i['未更新天数'] <= 7).length;
  const overdue = data.filter(i => i['未更新天数'] > 7).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statUpdated').textContent = updated;
  document.getElementById('statWeek').textContent = week;
  document.getElementById('statOverdue').textContent = overdue;
}

function resetStats() {
  ['statTotal','statUpdated','statWeek','statOverdue'].forEach(id => {
    document.getElementById(id).textContent = '0';
  });
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 搜索
document.getElementById('searchInput').addEventListener('input', () => {
  if (currentDate && allData[currentDate]) {
    renderTable(allData[currentDate]);
    updateStats(allData[currentDate]);
  }
});
</script>
</body>
</html>
